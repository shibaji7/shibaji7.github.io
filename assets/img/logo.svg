<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0e1820"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#g1)"/>

  <!-- Thin gold outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c9a84c" stroke-width="1"/>

  <!-- Initials SC -->
  <text x="50" y="62"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-size="34"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-1">SC</text>

  <!-- Thin gold rule below text -->
  <line x1="28" y1="70" x2="72" y2="70" stroke="#c9a84c" stroke-width="0.8"/>

  <!-- Gold dots -->
  <circle cx="50" cy="77" r="1.5" fill="#c9a84c" opacity="0.8"/>
  <circle cx="44" cy="77" r="0.8" fill="#c9a84c" opacity="0.4"/>
  <circle cx="56" cy="77" r="0.8" fill="#c9a84c" opacity="0.4"/>
</svg>
